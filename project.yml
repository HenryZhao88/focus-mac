name: FocusApp
options:
  bundleIdPrefix: com.focusapp
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

targets:
  FocusApp:
    type: application
    platform: macOS
    sources:
      - path: FocusApp
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        CONFIGURATION_BUILD_DIR: $(SRCROOT)/build/$(CONFIGURATION)
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        INFOPLIST_FILE: FocusApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.focusapp.FocusApp
    entitlements:
      path: FocusApp/FocusApp.entitlements

  FocusAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - FocusAppTests
    dependencies:
      - target: FocusApp
    settings:
      base:
        CONFIGURATION_BUILD_DIR: $(SRCROOT)/build/$(CONFIGURATION)
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.focusapp.FocusAppTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  FocusApp:
    build:
      targets:
        FocusApp: all
        FocusAppTests: [test]
    run:
      workingDirectory: $(SRCROOT)
    test:
      targets:
        - FocusAppTests
