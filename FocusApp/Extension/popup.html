<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      padding: 12px;
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      color: #333;
    }
    #status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }
    .dot.connected { background: #4caf50; }
    .dot.disconnected { background: #f44336; }
  </style>
</head>
<body>
  <div id="status">
    <div class="dot" id="dot"></div>
    <span id="label">Checking...</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
